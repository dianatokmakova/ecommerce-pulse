# E-Commerce Pulse — единый стек.
# Поднять:  cp .env.example .env  &&  docker compose up -d
#
# Состав: ClickHouse + MinIO + Airflow(+Postgres) + dashboard-api.
# BI: свой дашборд (dashboard/ на Vercel → dashboard-api) и/или Yandex DataLens.
#
# Airflow здесь в варианте LocalExecutor (просто и не жрёт память).
# Каноничный Celery-compose всегда можно взять из офиц. документации Airflow.

x-airflow-common: &airflow-common
  build: ./airflow                 # кастомный образ с зависимостями (см. airflow/Dockerfile)
  image: ecp-airflow:3.2.2         # общий тег → собирается один раз, используют все airflow-сервисы
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    # В Airflow 3.x дефолтный auth manager — SimpleAuthManager, у него нет ролей и
    # ломается `airflow users create`. Включаем FAB (логин по admin/паролю из .env).
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    # креды ClickHouse/MinIO пробрасываем в DAG'и через env
    CH_HOST: clickhouse
    CH_PORT: "8123"
    CH_USER: ${CLICKHOUSE_USER}
    CH_PASSWORD: ${CLICKHOUSE_PASSWORD}
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
    MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    FAKE_API_URL: ${FAKE_API_URL}
    # OLTP-источник (Postgres) для DAG oltp_sync
    OLTP_HOST: oltp
    OLTP_PORT: "5432"
    OLTP_DB: marketplace
    OLTP_SCHEMA: shop
    OLTP_USER: shop
    OLTP_PASSWORD: ${OLTP_PASSWORD}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/logs:/opt/airflow/logs
    - ./ingestion:/opt/airflow/ingestion
    - ./analytics:/opt/airflow/analytics
  depends_on: &airflow-deps
    postgres:
      condition: service_healthy

services:
  # ---------------------------------------------------------------- ClickHouse
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: ecp-clickhouse
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:                            # только на localhost; наружу проксирует nginx/Caddy
      - "127.0.0.1:${CH_HTTP_PORT:-8123}:8123"     # HTTP (DataLens / BI / clickhouse-connect)
      - "127.0.0.1:${CH_NATIVE_PORT:-9000}:9000"   # native TCP
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    volumes:
      - ch_data:/var/lib/clickhouse
      - ./infra/clickhouse/init:/docker-entrypoint-initdb.d   # *.sql применяются при первом старте
      # монтируем ОДИН файл, а не всю config.d — иначе перекрывается штатный
      # docker_related_config.xml образа (listen_host=0.0.0.0), и CH слушает только localhost
      - ./infra/clickhouse/config.d/memory.xml:/etc/clickhouse-server/config.d/memory.xml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --------------------------------------------------------------------- MinIO
  minio:
    image: minio/minio:latest
    container_name: ecp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:                            # только на localhost; консоль наружу — через nginx/Caddy
      - "127.0.0.1:${MINIO_S3_PORT:-9002}:9000"        # S3 API (внутри Docker всё равно minio:9000)
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"   # веб-консоль MinIO
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  # создаёт бакеты raw/staging при старте
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb -p local/raw;
      mc mb -p local/staging;
      echo 'buckets ready'; exit 0;
      "

  # ---------------------------------------------------- Postgres (метаданные Airflow)
  postgres:
    image: postgres:16
    container_name: ecp-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ------------------------------------------- OLTP Postgres (операционная БД маркетплейса)
  # Отдельный инстанс от метаданных Airflow: источник для ELT в ClickHouse (DAG oltp_sync).
  oltp:
    image: postgres:16
    container_name: ecp-oltp
    environment:
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: ${OLTP_PASSWORD}
      POSTGRES_DB: marketplace
    volumes:
      - oltp_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d   # схема + сид при первом старте
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "shop", "-d", "marketplace"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --------------------------------------------------------- Airflow: init (один раз)
  airflow-init:
    <<: *airflow-common
    container_name: ecp-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "${AIRFLOW_ADMIN_USER}" --password "${AIRFLOW_ADMIN_PASSWORD}" \
          --firstname Admin --lastname User --role Admin --email admin@example.com || true
    restart: "no"

  airflow-apiserver:           # в Airflow 3.x UI/REST отдаёт api-server
    <<: *airflow-common
    container_name: ecp-airflow-api
    command: api-server
    ports:                            # только на localhost; UI наружу — через nginx/Caddy
      - "127.0.0.1:${AIRFLOW_PORT:-8080}:8080"
    depends_on:
      <<: *airflow-deps
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    container_name: ecp-airflow-scheduler
    command: scheduler
    depends_on:
      <<: *airflow-deps
      airflow-init:
        condition: service_completed_successfully
    restart: always

  airflow-dag-processor:       # в Airflow 3.x парсинг DAG вынесен в отдельный процесс
    <<: *airflow-common
    container_name: ecp-airflow-dagproc
    command: dag-processor
    depends_on:
      <<: *airflow-deps
      airflow-init:
        condition: service_completed_successfully
    restart: always

  # ----------------------------------------------- Dashboard API (read-only → gold)
  dashboard-api:
    build: ./dashboard-api
    container_name: ecp-dashboard-api
    environment:
      CH_HOST: clickhouse
      CH_PORT: "8123"
      CH_USER: bi_reader                       # read-only юзер из 01_databases.sql
      CH_PASSWORD: ${BI_READER_PASSWORD}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-*}   # домен фронта на Vercel (или * для демо)
    ports:                            # только на localhost; наружу (api.домен) — через nginx/Caddy
      - "127.0.0.1:${DASHBOARD_PORT:-8000}:8000"
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: always

  # ------------------------------------------------ Caddy (авто-HTTPS реверс-прокси)
  # Единственный сервис, который торчит наружу (80/443). Всё остальное — на 127.0.0.1.
  # Домены и пароли консолей правятся в infra/caddy/Caddyfile.
  # Локально не нужен (нет реальных доменов) → спрятан за профиль server:
  #   сервер:  docker compose --profile server up -d
  #   локально: docker compose up -d   (ходишь по 127.0.0.1:PORT)
  caddy:
    image: caddy:2
    container_name: ecp-caddy
    profiles: ["server"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: always

volumes:
  ch_data:
  minio_data:
  pg_data:
  oltp_data:
  caddy_data:
  caddy_config:

# СЕТЬ: наружу торчит ТОЛЬКО Caddy (80/443). Все остальные порты привязаны к 127.0.0.1 —
# снаружи недоступны (важно: Docker публикует порты в обход ufw, поэтому привязка к localhost,
# а не «закрою файрволом»). Внутри Docker-сети сервисы видят друг друга по имени.
# Caddy (infra/caddy/Caddyfile) даёт HTTPS-домены:
#   api.домен   → dashboard-api:8000   (сюда смотрит фронт на Vercel)
#   ch.домен    → clickhouse:8123      (DataLens и прочие BI, юзер bi_reader)
#   airflow.домен, minio.домен → консоли под basic-auth
# Файрвол на сервере: открыть только 80 и 443.
